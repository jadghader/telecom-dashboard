name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - release  # Ensure "release" branch is included
  workflow_dispatch:  # ✅ Required for manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm' # Caches node_modules to speed up builds

      - name: Install Dependencies
        run: npm ci # Ensures a clean, repeatable install

      - name: Create .env for build
        env:
          REACT_APP_FIREBASE_CONFIG_B64: ${{ secrets.REACT_APP_FIREBASE_CONFIG_B64 }}
        run: |
          cat > .env <<EOF
          REACT_APP_FIREBASE_CONFIG_B64=$REACT_APP_FIREBASE_CONFIG_B64
          EOF

      - name: Build Project
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Google Cloud
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > $HOME/gcloud.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud.json" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,firestore:rules
